name: Backup Restore Test

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 3 * * 0' # weekly on Sunday at 03:30 UTC

jobs:
  restore-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: restore
          POSTGRES_PASSWORD: restore
          POSTGRES_DB: restore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U restore -d restore_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-17 gpg

      - name: Download latest backup artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow="Scheduled Encrypted Backup" --branch master --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "No successful backup run found. Trigger a backup first."
            exit 1
          fi
          gh run download "$RUN_ID" --name db-backup-encrypted --dir /tmp/recoveryflow-backup
          ls -1 /tmp/recoveryflow-backup | tail -n 1 > /tmp/latest_backup_name

      - name: Decrypt backup
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          BACKUP_FILE=$(cat /tmp/latest_backup_name)
          gpg --batch --no-tty --yes --pinentry-mode loopback \
            --passphrase "$BACKUP_PASSPHRASE" \
            -o /tmp/restore.sql.gz -d "/tmp/recoveryflow-backup/$BACKUP_FILE"
          gunzip -f /tmp/restore.sql.gz

      - name: Restore into staging database
        env:
          PGPASSWORD: restore
        run: |
          psql -h 127.0.0.1 -U restore -d restore_test -f /tmp/restore.sql
          psql -h 127.0.0.1 -U restore -d restore_test -c "SELECT COUNT(*) AS tables FROM information_schema.tables WHERE table_schema = 'public';"
