name: Scheduled Encrypted Backup

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client gpg awscli

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x scripts/backup/pg_backup_encrypt.sh
          scripts/backup/pg_backup_encrypt.sh recoverflow-prod

      - name: Upload workflow log artifact (for evidence)
        uses: actions/upload-artifact@v4
        with:
          name: backup-log
          path: ${{ github.workspace }}
