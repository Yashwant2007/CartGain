name: Scheduled Encrypted Backup

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backup via Docker (Postgres 17)
        env:
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          FILENAME="recoverflow-prod-${TIMESTAMP}.sql.gz"
          ENC_FILENAME="${FILENAME}.gpg"

          # Dump using official Postgres 17 Docker image (matches Supabase server version)
          docker run --rm -e DIRECT_URL postgres:17 \
            sh -c "pg_dump --dbname=\"$DIRECT_URL\" | gzip" > "/tmp/${FILENAME}"

          # Encrypt (gpg -c creates FILENAME.gpg in the same directory)
          gpg --batch --no-tty --yes --pinentry-mode loopback \
            --passphrase "$BACKUP_PASSPHRASE" \
            -c "/tmp/${FILENAME}"
          shred -u "/tmp/${FILENAME}"

          echo "Backup created: ${ENC_FILENAME}"

      - name: Upload encrypted backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-encrypted
          path: /tmp/recoverflow-prod-*.sql.gz.gpg
          retention-days: 30
