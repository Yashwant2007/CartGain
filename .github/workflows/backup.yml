name: Scheduled Encrypted Backup

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Postgres client
        run: |
          sudo apt-get update && sudo apt-get install -y curl gnupg lsb-release
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Ensure pg_dump 17 is in PATH before any system-installed pg_dump
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Run backup script
        env:
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          chmod +x scripts/backup/pg_backup_encrypt.sh
          scripts/backup/pg_backup_encrypt.sh recoverflow-prod

      - name: Upload encrypted backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-encrypted
          path: /tmp/recoverflow-prod-*.sql.gz.gpg
          retention-days: 30
